name: Bug report
description: Report incorrect behavior in the CLI, adapters, payloads, or release flow.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Include the Sift command, config snippet, and the observed output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: php
    attributes:
      label: PHP version
      placeholder: 8.3.x
